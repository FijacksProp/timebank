<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Time Bank{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: radial-gradient(circle at top right, #f0f9ff 0%, #ffffff 45%, #f8fafc 100%); }
  </style>
</head>
<body class="text-slate-900 min-h-screen">
  <header class="border-b border-slate-200 bg-white/80 backdrop-blur-md sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="font-bold text-xl tracking-tight">Time Bank</a>
      <nav class="flex items-center gap-4 text-sm">
        {% if request.user.is_authenticated %}
          <a href="/dashboard/" class="hover:text-sky-600">Dashboard</a>
          <a href="/matches/" class="hover:text-sky-600">Matches</a>
          <a href="/sessions/" class="hover:text-sky-600">Sessions</a>
          <form action="/auth/logout/" method="post">{% csrf_token %}<button class="text-rose-600">Logout</button></form>
        {% else %}
          <a href="/auth/login/" class="hover:text-sky-600">Login</a>
          <a href="/auth/signup/" class="bg-slate-900 text-white px-3 py-1.5 rounded-lg">Get Started</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    {% if messages %}
      <div class="space-y-2 mb-6">
        {% for message in messages %}
          <div class="rounded-lg px-4 py-3 bg-amber-50 border border-amber-200 text-amber-900">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
