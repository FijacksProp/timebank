{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
  <h1 class="text-2xl font-bold mb-4">Welcome back</h1>
  <form method="post" class="space-y-3">{% csrf_token %}
    {{ form.as_p }}
    <button class="w-full bg-slate-900 text-white py-2.5 rounded-lg">Login</button>
  </form>
</div>
{% endblock %}
