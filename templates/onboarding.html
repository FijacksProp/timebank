{% extends 'base.html' %}
{% block title %}Onboarding{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
  <h1 class="text-2xl font-bold mb-4">Set up your skill profile</h1>
  <form method="post" class="space-y-3">{% csrf_token %}
    {{ form.as_p }}
    <button class="bg-slate-900 text-white px-5 py-2.5 rounded-lg">Save Profile</button>
  </form>
</div>
{% endblock %}
